<!-- Theme toggle switch -->
<div class="theme-toggle">
    <input type="checkbox" id="theme-switch">
    <label for="theme-switch" aria-label="Toggle dark mode"></label>
</div>

<!-- Sidebar toggle button -->
<button class="sidebar-toggle sidebar-visible" id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
    ✕
</button>

<div class="content">
    <!-- Intro and countdown -->
    <div class="intro-countdown-wrapper">
        <div class="countdown" id="countdown"></div>
        <div class="intro-text">Automated time and activity logger. Asks what you're up to at regular intervals.</div>
    </div>
    
    <!-- Settings panel -->
    <div class="settings-panel" id="settings-panel">
        <h3>Settings</h3>
        <label for="interval-setting">Prompt Interval (minutes):</label>
        <input type="number" id="interval-setting" min="1" max="60" value="30">
        
        <label for="timeout-setting">Dialog Timeout (seconds):</label>
        <input type="number" id="timeout-setting" min="10" max="120" value="30">
        
        <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
            <input type="checkbox" id="beep-setting" style="width: auto; min-height: auto;">
            Enable beep notification
        </label>
        
        <label for="quickfill-setting">Categories (emoji label, one per line):</label>
        <textarea id="quickfill-setting" rows="6"></textarea>
        
        <button class="btn-secondary" onclick="saveSettings()">Save Settings</button>
        <button class="btn-tertiary" onclick="toggleSettings()">Cancel</button>
        <div style="margin-top: 15px; font-size: 11px; color: #999;">ActiveTrack v0.47</div>
    </div>
    
    <!-- Question container -->
    <div class="question-container" id="question-container"></div>
    
    <div class="button-toolbar">
        <button id="pause-btn" class="btn-secondary btn-icon pause-btn" onclick="togglePause()" title="Pause timer (P)">⏸</button>
        <button class="btn-secondary btn-icon" onclick="toggleSettings()" title="Settings">⚙</button>
        <span class="save-indicator" id="save-indicator">✓ Saved</span>
    </div>
    
    <div class="keyboard-hints">
        Keyboard shortcuts: Press P to pause/unpause • Press ESC to cancel dialog
    </div>
</div>

<div id="sidebar" class="sidebar"></div>

<!-- Undo banner -->
<div class="undo-banner" id="undo-banner">
    <span id="undo-message"></span>
    <button onclick="undoDelete()">Undo</button>
</div>

<script>
// Configuration with defaults
const DEFAULT_CATEGORIES = [
    { emoji: '🔧', label: 'Break-Fix' },
    { emoji: '🎫', label: 'Ticket' },
    { emoji: '📋', label: 'Projects' },
    { emoji: '🤝', label: 'Meeting' },
    { emoji: '💬', label: 'Support' },
    { emoji: '📧', label: 'Comms' },
    { emoji: '📚', label: 'Learning' },
    { emoji: '🛠️', label: 'Admin' },
    { emoji: '☕', label: 'Break' },
    { emoji: '❓', label: 'Other' }
];

let config = {
    intervalMinutes: 30,
    timeoutSeconds: 30,
    darkMode: true,
    sidebarCollapsed: false,
    beepEnabled: false,
    categories: [...DEFAULT_CATEGORIES]
};

// Activity log data
let activityLog = [];
let lastCategory = "";
let countdownTime = config.intervalMinutes * 60;
let isPaused = false;
let countdownInterval;
let isDialogOpen = false;
let lastSidebarLength = 0; // Track sidebar entries for efficient updates
let deletedLog = null; // For undo functionality
let undoTimeout = null;
let saveDebounceTimeout = null; // For debounced saves
let midnightTimeout = null; // For midnight rotation check

// Dialog state
let dialogInterval = null;
let dialogCountdown = 0;
let dialogCountdownLabel = null;
let dialogDialog = null;

// Title bar animation
let originalTitle = 'ActiveTrack';
let invertInterval = null;

// --- Custom modal dialogs (replaces native alert/confirm) ---
function showModal(title, message, buttons) {
    return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.classList.add('custom-modal');
        overlay.innerHTML = `
            <div class="custom-modal-box">
                <h3>${title}</h3>
                <p>${message}</p>
                <div class="custom-modal-actions"></div>
            </div>
        `;
        const actions = overlay.querySelector('.custom-modal-actions');
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.textContent = btn.label;
            b.className = btn.className || 'btn-secondary';
            b.onclick = () => { overlay.remove(); resolve(btn.value); };
            actions.appendChild(b);
        });
        document.body.appendChild(overlay);
    });
}

function showAlert(title, message) {
    return showModal(title, message, [
        { label: 'OK', value: true, className: 'btn-secondary' }
    ]);
}

function showConfirm(title, message, confirmLabel, cancelLabel) {
    return showModal(title, message, [
        { label: cancelLabel || 'Cancel', value: false, className: 'btn-tertiary' },
        { label: confirmLabel || 'OK', value: true, className: 'btn-secondary' }
    ]);
}

// --- localStorage functions with debouncing ---
function saveToLocalStorage() {
    // Debounce saves to avoid excessive writes
    if (saveDebounceTimeout) clearTimeout(saveDebounceTimeout);
    
    saveDebounceTimeout = setTimeout(() => {
        try {
            localStorage.setItem('activityLog', JSON.stringify(activityLog));
            localStorage.setItem('lastCategory', lastCategory);
            localStorage.setItem('config', JSON.stringify(config));
            showSaveIndicator();
        } catch (e) {
            console.error('Failed to save to localStorage:', e);
        }
    }, 500); // Wait 500ms before saving
}

function saveToLocalStorageImmediate() {
    // For critical saves that shouldn't be debounced
    if (saveDebounceTimeout) clearTimeout(saveDebounceTimeout);
    try {
        localStorage.setItem('activityLog', JSON.stringify(activityLog));
        localStorage.setItem('lastCategory', lastCategory);
        localStorage.setItem('config', JSON.stringify(config));
        showSaveIndicator();
    } catch (e) {
        console.error('Failed to save to localStorage:', e);
    }
}

function showSaveIndicator() {
    const indicator = document.getElementById('save-indicator');
    indicator.classList.add('visible');
    setTimeout(() => {
        indicator.classList.remove('visible');
    }, 2000);
}

// --- Daily log rotation ---
function getTodayString() {
    return new Date().toISOString().split('T')[0];
}

function checkDayRotation() {
    const today = getTodayString();
    const lastDate = localStorage.getItem('lastActiveDate');
    
    if (lastDate && lastDate !== today && activityLog.length > 0) {
        // Day has changed and there are entries from previous day
        promptDayRotation(lastDate);
    } else {
        localStorage.setItem('lastActiveDate', today);
    }
}

function promptDayRotation(previousDate) {
    const entryCount = activityLog.length;
    const message = `You have ${entryCount} entries from ${previousDate}.\n\nSave yesterday's log before starting fresh?`;
    
    showConfirm('New Day', message, 'Save & Clear', 'Just Clear').then(save => {
        if (save) {
            try {
                const parts = previousDate.split('-');
                const filename = `ActiveTrack-${parts[0]}-${parts[1]}-${parts[2]}.csv`;
                const blob = new Blob([getCSVContent()], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.setAttribute('href', URL.createObjectURL(blob));
                link.setAttribute('download', filename);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                showAlert('Error', 'Failed to download CSV: ' + e.message);
            }
        }
        
        activityLog = [];
        lastCategory = '';
        lastSidebarLength = 0;
        updateSidebar();
        localStorage.setItem('lastActiveDate', getTodayString());
        saveToLocalStorageImmediate();
    });
}

function scheduleMidnightCheck() {
    // Calculate ms until midnight
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    const msUntilMidnight = midnight - now;
    
    if (midnightTimeout) clearTimeout(midnightTimeout);
    
    midnightTimeout = setTimeout(() => {
        checkDayRotation();
        scheduleMidnightCheck(); // Schedule next check
    }, msUntilMidnight + 1000); // +1s buffer past midnight
}

function loadFromLocalStorage() {
    try {
        const savedLog = localStorage.getItem('activityLog');
        const savedCategory = localStorage.getItem('lastCategory');
        const savedConfig = localStorage.getItem('config');
        
        if (savedLog) activityLog = JSON.parse(savedLog);
        if (savedCategory) lastCategory = savedCategory;
        if (savedConfig) {
            const parsed = JSON.parse(savedConfig);
            // Migrate old quickFillOptions to categories if needed
            if (parsed.quickFillOptions && !parsed.categories) {
                parsed.categories = [...DEFAULT_CATEGORIES];
                delete parsed.quickFillOptions;
            }
            // Merge with defaults to handle new config properties
            config = { ...config, ...parsed };
            countdownTime = config.intervalMinutes * 60;
        }
        
        // Apply dark mode if saved
        if (config.darkMode) {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-switch').checked = true;
        }
        
        // Apply sidebar state if saved
        if (config.sidebarCollapsed) {
            document.getElementById('sidebar').classList.add('collapsed');
            const toggleBtn = document.getElementById('sidebar-toggle');
            toggleBtn.textContent = '☰';
            toggleBtn.classList.remove('sidebar-visible');
            toggleBtn.classList.add('sidebar-collapsed');
        }
    } catch (e) {
        console.error('Failed to load from localStorage:', e);
    }
}

// --- Play beep sound with error handling ---
function playBeep() {
    if (!config.beepEnabled) return;
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
        oscillator.connect(audioContext.destination);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.2);
    } catch (e) {
        console.warn('Audio playback failed:', e);
    }
}

// --- Update countdown to next dialog ---
function updateCountdown() {
    if (isPaused) return;
    
    const minutes = Math.floor(countdownTime / 60);
    const seconds = countdownTime % 60;
    const countdownEl = document.getElementById("countdown");
    countdownEl.textContent = `Next dialog: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    
    // Add warning class if under 1 minute
    if (countdownTime < 60 && countdownTime > 0) {
        countdownEl.classList.add('warning');
    } else {
        countdownEl.classList.remove('warning');
    }
    
    countdownTime--;
    
    if (countdownTime < 0) {
        countdownTime = config.intervalMinutes * 60;
        promptActivity();
    }
}

// --- Update sidebar with activity log (optimized) ---
function updateSidebar() {
    const sidebar = document.getElementById('sidebar');
    const totalEntries = activityLog.length;
    
    // Calculate daily tracked hours
    const today = getTodayString();
    const todayEntries = activityLog.filter(e => e.date === today);
    let dailyHoursText = '0h 0m';
    if (todayEntries.length >= 2) {
        const first = todayEntries[0].time;
        const last = todayEntries[todayEntries.length - 1].time;
        const [fh, fm, fs] = first.split(':').map(Number);
        const [lh, lm, ls] = last.split(':').map(Number);
        const diffMin = (lh * 60 + lm) - (fh * 60 + fm);
        if (diffMin > 0) {
            dailyHoursText = `${Math.floor(diffMin / 60)}h ${diffMin % 60}m`;
        }
    } else if (todayEntries.length === 1) {
        // Single entry — time since first entry
        const first = todayEntries[0].time;
        const [fh, fm] = first.split(':').map(Number);
        const now = new Date();
        const diffMin = (now.getHours() * 60 + now.getMinutes()) - (fh * 60 + fm);
        if (diffMin > 0) {
            dailyHoursText = `${Math.floor(diffMin / 60)}h ${diffMin % 60}m`;
        }
    }

    // Always do full rebuild to include action icons
    sidebar.innerHTML = `
        <h2>Activity Log</h2>
        <div class="log-stats">
            <strong>Total Entries:</strong> ${totalEntries} &nbsp;|&nbsp; <strong>Today:</strong> ${todayEntries.length} entries &nbsp;|&nbsp; <strong>Tracked:</strong> ${dailyHoursText}
        </div>
        <button class="add-btn btn-secondary btn-icon" onclick="toggleAddForm()" title="Add a manual entry">+</button>
        <div class="add-entry-form" id="add-entry-form">
            <input type="date" id="add-date" value="${getTodayString()}">
            <input type="time" id="add-time" step="1" value="${new Date().toTimeString().split(' ')[0]}">
            <div class="category-row">
                <select id="add-category" aria-label="Category">
                    <option value="">-- Category --</option>
                    ${config.categories.map(cat => `<option value="${cat.label}">${cat.emoji} ${cat.label}</option>`).join('')}
                </select>
                <input type="text" id="add-response" placeholder="Details (optional)">
            </div>
            <button class="btn-secondary" onclick="addManualEntry()">Save</button>
            <button class="btn-tertiary" onclick="toggleAddForm()">Cancel</button>
        </div>
        <table id="activity-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Category</th>
                    <th>Details</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="activity-tbody">
                ${activityLog.map((entry, i) => {
                    const cat = config.categories.find(c => c.label === entry.category);
                    const catDisplay = cat ? cat.emoji + ' ' + cat.label : (entry.category || '');
                    return `
                    <tr id="row-${i}">
                        <td>${entry.date}</td>
                        <td>${entry.time}</td>
                        <td>${catDisplay}</td>
                        <td id="resp-${i}">${entry.response || ''}</td>
                        <td class="action-icons">
                            <span onclick="editEntry(${i})" title="Edit">✏️</span>
                            <span onclick="deleteEntry(${i})" title="Delete">🗑️</span>
                        </td>
                    </tr>`;
                }).join('')}
            </tbody>
        </table>
        ${totalEntries === 0 ? '<div class="empty-state">No entries yet. Activity will appear here as you log it.</div>' : ''}
        <button class="btn-secondary" onclick="downloadCSV()" title="Download log as CSV">📄 CSV</button>
        <button class="btn-secondary" onclick="exportLog()" title="Export log as JSON">⬇ Export</button>
        <button class="btn-secondary" onclick="importLog()" title="Import log from JSON">� Import</button>
        <button class="btn-danger" onclick="clearLog()" title="Clear all log entries">🗑 Clear</button>
    `;
    lastSidebarLength = totalEntries;
}

// --- Prompt user for activity ---
function promptActivity() {
    if (isDialogOpen) return;
    
    playBeep();
    invertTitleBar();
    isDialogOpen = true;
    
    // Dialog setup
    dialogDialog = document.createElement('div');
    dialogDialog.classList.add('dialog');
    dialogDialog.setAttribute('role', 'dialog');
    dialogDialog.setAttribute('aria-labelledby', 'dialog-title');
    
    let lastAnswerLabel = document.createElement('div');
    lastAnswerLabel.classList.add('last-answer');
    const lastCatDisplay = lastCategory ? config.categories.find(c => c.label === lastCategory) : null;
    lastAnswerLabel.textContent = `Last: ${lastCatDisplay ? lastCatDisplay.emoji + ' ' + lastCatDisplay.label : 'Nothing'}`;
    
    let label = document.createElement('label');
    label.id = 'dialog-title';
    label.textContent = 'What are you doing?';
    
    // Category + detail row
    let categoryRow = document.createElement('div');
    categoryRow.classList.add('category-row');
    
    let select = document.createElement('select');
    select.setAttribute('aria-label', 'Category');
    
    let defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.textContent = '-- Category --';
    select.appendChild(defaultOption);
    
    config.categories.forEach(cat => {
        let option = document.createElement('option');
        option.value = cat.label;
        option.textContent = `${cat.emoji} ${cat.label}`;
        select.appendChild(option);
    });
    
    // Pre-select last category if available
    if (lastCategory) select.value = lastCategory;
    
    let input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Details (optional)';
    input.setAttribute('aria-label', 'Activity details');
    
    categoryRow.appendChild(select);
    categoryRow.appendChild(input);
    
    let submit = document.createElement('button');
    submit.textContent = 'Submit';
    submit.classList.add('btn-secondary');
    
    dialogCountdownLabel = document.createElement('div');
    dialogCountdownLabel.classList.add('dialog-countdown');
    dialogCountdown = config.timeoutSeconds;
    dialogCountdownLabel.textContent = `Time left: ${dialogCountdown}s`;
    
    dialogDialog.appendChild(lastAnswerLabel);
    dialogDialog.appendChild(label);
    dialogDialog.appendChild(categoryRow);
    dialogDialog.appendChild(submit);
    dialogDialog.appendChild(dialogCountdownLabel);
    
    document.getElementById('question-container').appendChild(dialogDialog);
    
    // Focus input for better UX
    setTimeout(() => input.focus(), 100);
    
    // Dialog countdown interval
    if (dialogInterval) clearInterval(dialogInterval);
    dialogInterval = setInterval(() => {
        if (!isPaused) {
            dialogCountdown--;
            dialogCountdownLabel.textContent = `Time left: ${dialogCountdown}s`;
            
            // Warning at 10 seconds
            if (dialogCountdown === 10) {
                dialogCountdownLabel.classList.add('warning');
                playBeep();
            }
            
            if (dialogCountdown <= 0) {
                clearInterval(dialogInterval);
                recordActivity(lastCategory || '', '');
                closeDialog();
            }
        }
    }, 1000);
    
    function submitResponse() {
        clearInterval(dialogInterval);
        const category = select.value || lastCategory || '';
        const detail = input.value.trim();
        recordActivity(category, detail);
        closeDialog();
    }
    
    function closeDialog() {
        if (dialogDialog && dialogDialog.parentNode) {
            document.getElementById('question-container').removeChild(dialogDialog);
        }
        isDialogOpen = false;
        restoreTitleBar();
    }
    
    submit.onclick = submitResponse;
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            submitResponse();
        } else if (e.key === 'Escape') {
            clearInterval(dialogInterval);
            closeDialog();
        }
    });
}

// --- Invert the color of the title bar for attention ---
function invertTitleBar() {
    let invertState = false;
    let invertCount = 0;
    
    if (invertInterval) clearInterval(invertInterval);
    
    invertInterval = setInterval(() => {
        document.title = invertState ? 'ACTIVETRACK' : originalTitle;
        invertState = !invertState;
        invertCount++;
        
        if (invertCount > 7) {
            restoreTitleBar();
        }
    }, 500);
}

function restoreTitleBar() {
    if (invertInterval) {
        clearInterval(invertInterval);
        invertInterval = null;
    }
    document.title = originalTitle;
}

// --- Record activity to log ---
function recordActivity(category, detail) {
    const now = new Date();
    activityLog.push({
        date: now.toISOString().split('T')[0],
        time: now.toTimeString().split(' ')[0],
        category: category,
        response: detail
    });
    lastCategory = category;
    updateSidebar();
    saveToLocalStorage();
}

// --- Convert activity log to CSV ---
function getCSVContent() {
    let csv = 'Date,Time,Category,Details\n';
    activityLog.forEach(entry => {
        csv += `${entry.date},${entry.time},"${(entry.category || '').replace(/"/g, '""')}","${(entry.response || '').replace(/"/g, '""')}"\n`;
    });
    return csv;
}

// --- Download activity log as CSV ---
function downloadCSV() {
    try {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const filename = `ActiveTrack-${year}-${month}-${day}.csv`;
        const blob = new Blob([getCSVContent()], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.setAttribute('href', URL.createObjectURL(blob));
        link.setAttribute('download', filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    } catch (e) {
        showAlert('Error', 'Failed to download CSV: ' + e.message);
    }
}

// --- Export log as JSON ---
function exportLog() {
    try {
        const data = {
            version: '0.47',
            exported: new Date().toISOString(),
            config: config,
            lastCategory: lastCategory,
            activityLog: activityLog
        };
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const filename = `ActiveTrack-${year}-${month}-${day}.json`;
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const link = document.createElement('a');
        link.setAttribute('href', URL.createObjectURL(blob));
        link.setAttribute('download', filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    } catch (e) {
        showAlert('Error', 'Failed to export: ' + e.message);
    }
}

// --- Import log from JSON ---
function importLog() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                
                if (!data.activityLog || !Array.isArray(data.activityLog)) {
                    showAlert('Import Error', 'Invalid file format. Expected an ActiveTrack export file.');
                    return;
                }
                
                showImportDialog(data);
            } catch (err) {
                showAlert('Import Error', 'Failed to import: ' + err.message);
            }
        };
        reader.readAsText(file);
    };
    
    input.click();
}

function showImportDialog(data) {
    const overlay = document.createElement('div');
    overlay.classList.add('import-dialog');
    
    overlay.innerHTML = `
        <div class="import-dialog-box">
            <h3>Import Log</h3>
            <p>Found ${data.activityLog.length} entries from ${data.exported ? new Date(data.exported).toLocaleDateString() : 'unknown date'}.</p>
            <label><input type="radio" name="import-mode" value="merge" checked> Merge with existing log</label>
            <label><input type="radio" name="import-mode" value="replace"> Replace existing log</label>
            <div class="import-actions">
                <button class="btn-secondary" onclick="executeImport(this, 'confirm')">Import</button>
                <button class="btn-tertiary" onclick="this.closest('.import-dialog').remove()">Cancel</button>
            </div>
        </div>
    `;
    
    overlay.dataset.importData = JSON.stringify(data);
    document.body.appendChild(overlay);
}

function executeImport(btn, action) {
    const overlay = btn.closest('.import-dialog');
    const data = JSON.parse(overlay.dataset.importData);
    const mode = overlay.querySelector('input[name="import-mode"]:checked').value;
    
    if (mode === 'replace') {
        activityLog = data.activityLog;
        lastCategory = data.lastCategory || data.lastAnswer || '';
        if (data.config) {
            config = { ...config, ...data.config };
        }
    } else {
        // Merge and sort chronologically
        activityLog = activityLog.concat(data.activityLog);
        activityLog.sort((a, b) => {
            const tA = a.date + 'T' + a.time;
            const tB = b.date + 'T' + b.time;
            return tA.localeCompare(tB);
        });
    }
    
    lastSidebarLength = 0;
    updateSidebar();
    saveToLocalStorageImmediate();
    overlay.remove();
    showAlert('Import Complete', `${activityLog.length} total entries.`);
}

// --- Edit entry inline ---
function editEntry(index) {
    const cell = document.getElementById(`resp-${index}`);
    const currentValue = activityLog[index].response;
    
    cell.innerHTML = `<input class="edit-input" type="text" value="${currentValue.replace(/"/g, '&quot;')}" 
        onkeydown="if(event.key==='Enter') saveEdit(${index}, this.value); if(event.key==='Escape') updateSidebar();">
        <span onclick="saveEdit(${index}, this.previousElementSibling.value)" style="cursor:pointer;" title="Save">✅</span>
        <span onclick="updateSidebar()" style="cursor:pointer;" title="Cancel">❌</span>`;
    
    cell.querySelector('input').focus();
}

function saveEdit(index, newValue) {
    const trimmed = newValue.trim();
    if (trimmed) {
        activityLog[index].response = trimmed;
        lastSidebarLength = 0;
        updateSidebar();
        saveToLocalStorage();
    }
}

// --- Delete single entry ---
function deleteEntry(index) {
    const entry = activityLog[index];
    const catObj = config.categories.find(c => c.label === entry.category);
    const display = catObj ? `${catObj.emoji} ${catObj.label}` : (entry.response || entry.category || 'entry');
    showConfirm('Delete Entry', `Delete "${display}" at ${entry.time}?`, 'Delete', 'Cancel').then(ok => {
        if (ok) {
            activityLog.splice(index, 1);
            lastSidebarLength = 0;
            updateSidebar();
            saveToLocalStorage();
        }
    });
}

// --- Toggle add entry form ---
function toggleAddForm() {
    const form = document.getElementById('add-entry-form');
    form.classList.toggle('visible');
    
    if (form.classList.contains('visible')) {
        document.getElementById('add-date').value = getTodayString();
        document.getElementById('add-time').value = new Date().toTimeString().split(' ')[0];
        document.getElementById('add-category').value = '';
        document.getElementById('add-response').value = '';
    }
}

// --- Add manual entry (chronologically sorted) ---
function addManualEntry() {
    const date = document.getElementById('add-date').value;
    const time = document.getElementById('add-time').value;
    const category = document.getElementById('add-category').value;
    const response = document.getElementById('add-response').value.trim();
    
    if (!date || !time || !category) {
        showAlert('Missing Fields', 'Please select a date, time, and category.');
        return;
    }
    
    const newEntry = { date: date, time: time, category: category, response: response };
    const newTimestamp = date + 'T' + time;
    
    // Find correct insertion point
    let insertIndex = activityLog.length;
    for (let i = 0; i < activityLog.length; i++) {
        const entryTimestamp = activityLog[i].date + 'T' + activityLog[i].time;
        if (newTimestamp < entryTimestamp) {
            insertIndex = i;
            break;
        }
    }
    
    activityLog.splice(insertIndex, 0, newEntry);
    lastSidebarLength = 0;
    updateSidebar();
    saveToLocalStorage();
}

// --- Clear log with soft delete and undo ---
function clearLog() {
    showConfirm('Clear Log', 'Clear all activity log entries?\nYou can undo within 10 seconds.', 'Clear', 'Cancel').then(ok => {
        if (ok) {
            deletedLog = [...activityLog];
            activityLog = [];
            lastCategory = '';
            lastSidebarLength = 0;
            updateSidebar();
            saveToLocalStorageImmediate();
            
            const banner = document.getElementById('undo-banner');
            const message = document.getElementById('undo-message');
            message.textContent = `Cleared ${deletedLog.length} entries.`;
            banner.classList.add('visible');
            
            if (undoTimeout) clearTimeout(undoTimeout);
            undoTimeout = setTimeout(() => {
                banner.classList.remove('visible');
                deletedLog = null;
            }, 10000);
        }
    });
}

function undoDelete() {
    if (deletedLog) {
        activityLog = [...deletedLog];
        deletedLog = null;
        lastSidebarLength = 0;
        updateSidebar();
        saveToLocalStorageImmediate();
        
        // Hide banner
        document.getElementById('undo-banner').classList.remove('visible');
        if (undoTimeout) clearTimeout(undoTimeout);
    }
}

// --- Toggle pause/unpause ---
function togglePause() {
    isPaused = !isPaused;
    const pauseBtn = document.getElementById('pause-btn');
    const countdownEl = document.getElementById('countdown');
    
    pauseBtn.textContent = isPaused ? '▶' : '⏸';
    pauseBtn.title = isPaused ? 'Unpause timer (P)' : 'Pause timer (P)';
    pauseBtn.classList.toggle('paused', isPaused);
    
    // Visual feedback for paused state
    if (isPaused) {
        countdownEl.classList.add('paused');
        countdownEl.classList.remove('warning');
        clearInterval(countdownInterval);
    } else {
        countdownEl.classList.remove('paused');
        countdownInterval = setInterval(updateCountdown, 1000);
        if (countdownTime <= 0) {
            promptActivity();
        }
    }
}

// --- Settings panel ---
function toggleSettings() {
    const panel = document.getElementById('settings-panel');
    panel.classList.toggle('visible');
    
    if (panel.classList.contains('visible')) {
        document.getElementById('interval-setting').value = config.intervalMinutes;
        document.getElementById('timeout-setting').value = config.timeoutSeconds;
        document.getElementById('beep-setting').checked = config.beepEnabled;
        
        // Populate categories
        const categoriesText = config.categories.map(cat => `${cat.emoji} ${cat.label}`).join('\n');
        document.getElementById('quickfill-setting').value = categoriesText;
    }
}

function saveSettings() {
    const intervalMinutes = parseInt(document.getElementById('interval-setting').value);
    const timeoutSeconds = parseInt(document.getElementById('timeout-setting').value);
    const quickFillText = document.getElementById('quickfill-setting').value;
    
    // Validate inputs
    if (isNaN(intervalMinutes) || intervalMinutes < 1 || intervalMinutes > 60) {
        showAlert('Invalid Setting', 'Prompt interval must be between 1 and 60 minutes.');
        return;
    }
    
    if (isNaN(timeoutSeconds) || timeoutSeconds < 10 || timeoutSeconds > 120) {
        showAlert('Invalid Setting', 'Dialog timeout must be between 10 and 120 seconds.');
        return;
    }
    
    // Update config
    config.intervalMinutes = intervalMinutes;
    config.timeoutSeconds = timeoutSeconds;
    config.beepEnabled = document.getElementById('beep-setting').checked;
    countdownTime = intervalMinutes * 60;
    
    // Parse categories (format: "emoji label" per line)
    const lines = quickFillText.split('\n').filter(line => line.trim() !== '');
    if (lines.length > 0) {
        config.categories = lines.map(line => {
            const trimmed = line.trim();
            // Split on first space to separate emoji from label
            const spaceIdx = trimmed.indexOf(' ');
            if (spaceIdx > 0) {
                return { emoji: trimmed.substring(0, spaceIdx), label: trimmed.substring(spaceIdx + 1).trim() };
            }
            return { emoji: '❓', label: trimmed };
        });
    } else {
        // Reset to defaults if empty
        config.categories = [...DEFAULT_CATEGORIES];
    }
    
    saveToLocalStorageImmediate();
    toggleSettings();
    showAlert('Settings', 'Settings saved successfully.');
}

// --- Toggle sidebar visibility ---
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebar-toggle');
    
    sidebar.classList.toggle('collapsed');
    config.sidebarCollapsed = sidebar.classList.contains('collapsed');
    
    if (config.sidebarCollapsed) {
        toggleBtn.textContent = '☰';
        toggleBtn.classList.remove('sidebar-visible');
        toggleBtn.classList.add('sidebar-collapsed');
    } else {
        toggleBtn.textContent = '✕';
        toggleBtn.classList.remove('sidebar-collapsed');
        toggleBtn.classList.add('sidebar-visible');
    }
    
    saveToLocalStorage();
}

// --- Global keyboard shortcuts ---
document.addEventListener('keydown', function(e) {
    // P key to toggle pause (works globally, but not when typing in an input)
    if (e.key === 'p' || e.key === 'P') {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
            togglePause();
        }
    }
});

// --- Initialize sidebar and intervals ---
function initializeApp() {
    loadFromLocalStorage();
    checkDayRotation(); // Check if day has changed since last use
    updateSidebar();
    updateCountdown(); // Initial display
    countdownInterval = setInterval(updateCountdown, 1000);
    scheduleMidnightCheck(); // Schedule midnight rotation
    promptActivity();
    
    // Setup theme toggle listener
    document.getElementById('theme-switch').addEventListener('change', function() {
        config.darkMode = this.checked;
        document.body.classList.toggle('dark-mode', this.checked);
        saveToLocalStorage();
    });
    
    // Check rotation on tab reactivation
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
            checkDayRotation();
        }
    });
}

// --- Ensure DOM is ready before initializing ---
window.addEventListener('DOMContentLoaded', initializeApp);

// --- Register service worker for PWA ---
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service worker registered'))
        .catch(err => console.warn('Service worker registration failed:', err));
}

// --- Cleanup on page unload ---
window.addEventListener('beforeunload', () => {
    if (invertInterval) clearInterval(invertInterval);
    if (dialogInterval) clearInterval(dialogInterval);
    if (countdownInterval) clearInterval(countdownInterval);
    if (midnightTimeout) clearTimeout(midnightTimeout);
});
</script>
